<svg xmlns="http://www.w3.org/2000/svg" width="220" height="48" viewBox="0 0 220 48" role="img" aria-label="Kolorowe Rączki — Centrum Rozwoju Twojego Dziecka">
  <defs>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7db238"/>
      <stop offset="1" stop-color="#f0c24b"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Mark -->
  <g transform="translate(6 6)" filter="url(#soft)">
    <circle cx="18" cy="18" r="18" fill="#fff"/>
    <circle cx="18" cy="18" r="17" fill="none" stroke="url(#ring)" stroke-width="2.8"/>

    <!-- Simplified colorful hands -->
    <g transform="translate(18 18)">
      <!-- red -->
      <path d="M-13 1c-2 0-3-1.5-3-3.2 0-1.6 1.2-3.2 3-3.6 2-.4 3.8.3 5 1.8l5 6.5c.5.7.6 1.6.1 2.2-.6.8-1.6.9-2.7.4l-7.1-3.2c-.2 0-.4.1-.6.1z"
        fill="#e24a4a"/>
      <!-- green -->
      <path d="M-1 -14c0-2 1.5-3 3.2-3 1.6 0 3.2 1.2 3.6 3 .4 2-.3 3.8-1.8 5l-6.5 5c-.7.5-1.6.6-2.2.1-.8-.6-.9-1.6-.4-2.7l3.2-7.1c0-.2-.1-.4-.1-.6z"
        fill="#7db238"/>
      <!-- yellow -->
      <path d="M13 1c2 0 3-1.5 3-3.2 0-1.6-1.2-3.2-3-3.6-2-.4-3.8.3-5 1.8l-5 6.5c-.5.7-.6 1.6-.1 2.2.6.8 1.6.9 2.7.4l7.1-3.2c.2 0 .4.1.6.1z"
        fill="#f0c24b"/>
      <!-- blue -->
      <path d="M0 14c0 2-1.5 3-3.2 3-1.6 0-3.2-1.2-3.6-3-.4-2 .3-3.8 1.8-5l6.5-5c.7-.5 1.6-.6 2.2-.1.8.6.9 1.6.4 2.7l-3.2 7.1c0 .2.1.4.1.6z"
        fill="#2f66ff"/>
      <circle cx="0" cy="0" r="4.2" fill="#ffffff" stroke="#1f2a37" stroke-opacity="0.10"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(54 10)">
    <text x="0" y="14" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16" font-weight="900" fill="#1f2a37" letter-spacing="-0.02em">
      Kolorowe Rączki
    </text>
    <text x="0" y="32" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="11.5" font-weight="800" fill="rgba(31,42,55,.72)" letter-spacing="-0.01em">
      Centrum Rozwoju Twojego Dziecka
    </text>
  </g>
</svg>

